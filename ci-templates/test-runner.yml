# Auto-Detect Test Runner — Portable CI Template
# Automatically detects Python or Node project and runs appropriate checks.
# No secrets required (uses public runners only).
#
# Supported stacks:
#   Python: pytest + ruff (lint)
#   Node:   vitest/jest + eslint
#
# Deploy: copy to .github/workflows/test-runner.yml in any repo

name: Tests & Lint

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    name: Detect Stack
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      node: ${{ steps.detect.outputs.node }}
      node_pm: ${{ steps.detect.outputs.node_pm }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          # Python detection
          if [ -f "pyproject.toml" ] || [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "Pipfile" ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi

          # Node detection + package manager
          if [ -f "package.json" ]; then
            echo "node=true" >> "$GITHUB_OUTPUT"
            if [ -f "pnpm-lock.yaml" ]; then
              echo "node_pm=pnpm" >> "$GITHUB_OUTPUT"
            elif [ -f "bun.lockb" ] || [ -f "bun.lock" ]; then
              echo "node_pm=bun" >> "$GITHUB_OUTPUT"
            elif [ -f "yarn.lock" ]; then
              echo "node_pm=yarn" >> "$GITHUB_OUTPUT"
            else
              echo "node_pm=npm" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "node=false" >> "$GITHUB_OUTPUT"
            echo "node_pm=npm" >> "$GITHUB_OUTPUT"
          fi

  python-tests:
    name: Python Tests
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine Python version
        id: pyver
        run: |
          # Try to read from pyproject.toml, .python-version, or default to 3.11
          if [ -f ".python-version" ]; then
            echo "version=$(cat .python-version | head -1 | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          elif [ -f "pyproject.toml" ] && grep -q 'python_requires' pyproject.toml; then
            echo "version=3.11" >> "$GITHUB_OUTPUT"
          else
            echo "version=3.11" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.pyver.outputs.version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          elif [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          elif [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          fi
          # Ensure test/lint tools are available
          pip install pytest ruff 2>/dev/null || true

      - name: Lint with ruff
        run: |
          if command -v ruff &>/dev/null; then
            ruff check . --output-format=github
          else
            echo "ruff not available, skipping lint"
          fi

      - name: Run pytest
        run: |
          if command -v pytest &>/dev/null; then
            pytest -v --tb=short 2>&1
          else
            echo "pytest not available, skipping tests"
          fi

  node-tests:
    name: Node Tests
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine Node version
        id: nodever
        run: |
          if [ -f ".nvmrc" ]; then
            echo "version=$(cat .nvmrc | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          elif [ -f ".node-version" ]; then
            echo "version=$(cat .node-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          else
            echo "version=20" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nodever.outputs.version }}

      - name: Set up pnpm
        if: needs.detect.outputs.node_pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Bun
        if: needs.detect.outputs.node_pm == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          PM="${{ needs.detect.outputs.node_pm }}"
          case "$PM" in
            pnpm) pnpm install --frozen-lockfile ;;
            bun)  bun install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            *)    npm ci ;;
          esac

      - name: Lint
        run: |
          PM="${{ needs.detect.outputs.node_pm }}"
          # Check if lint script exists in package.json
          if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            case "$PM" in
              pnpm) pnpm run lint ;;
              bun)  bun run lint ;;
              yarn) yarn lint ;;
              *)    npm run lint ;;
            esac
          else
            echo "No lint script found in package.json, skipping"
          fi

      - name: Type check
        run: |
          PM="${{ needs.detect.outputs.node_pm }}"
          # Check if typecheck/tsc script exists
          if jq -e '.scripts.typecheck' package.json >/dev/null 2>&1; then
            case "$PM" in
              pnpm) pnpm run typecheck ;;
              bun)  bun run typecheck ;;
              yarn) yarn typecheck ;;
              *)    npm run typecheck ;;
            esac
          elif jq -e '.scripts["type-check"]' package.json >/dev/null 2>&1; then
            case "$PM" in
              pnpm) pnpm run type-check ;;
              bun)  bun run type-check ;;
              yarn) yarn type-check ;;
              *)    npm run type-check ;;
            esac
          elif [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "No TypeScript config found, skipping type check"
          fi

      - name: Run tests
        run: |
          PM="${{ needs.detect.outputs.node_pm }}"
          # Check if test script exists
          if jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            case "$PM" in
              pnpm) pnpm run test ;;
              bun)  bun run test ;;
              yarn) yarn test ;;
              *)    npm test ;;
            esac
          else
            echo "No test script found in package.json, skipping"
          fi
