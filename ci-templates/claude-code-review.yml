# Claude Code Review — Portable CI Template
# Requires: CLAUDE_CODE_OAUTH_TOKEN secret in repo settings
# Blocking: YES — CHANGES_REQUESTED blocks merge
#
# Deploy: copy to .github/workflows/claude-code-review.yml in any repo
#
# NOTE: Inline PR comments via mcp__github_inline_comment__create_inline_comment
# are currently DEACTIVATED. The MCP tool is not reliably available in the
# claude-code-action runtime. When re-enabled, add to allowed-tools in claude_args.

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    env:
      PR_NUM: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ env.PR_NUM }}
          REPO_NAME: ${{ github.repository }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: false
          allowed_bots: "claude[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the Principal Engineer Reviewer for a high-velocity startup. Your mandate: enforce rigorous engineering while respecting development speed.

            ### Review Philosophy

            1. **Net Positive > Perfection:** A change that improves code health ships. Don't block on imperfections.
            2. **Substance over style:** Assume CI (lint, tests) has passed. Focus on logic, security, architecture.
            3. **Signal intent:** Prefix minor polish suggestions with "**Nit:**".

            ### Hierarchical Review Checklist

            Analyze changes using this framework, in priority order:

            1. **Security (Non-Negotiable)**
                - User input validated, sanitized, escaped (XSS, SQLi)?
                - Auth/authz on all protected resources?
                - Secrets/credentials hardcoded or leaked in logs/errors?

            2. **Functionality & Correctness**
                - Business logic correct? Edge cases handled?
                - Race conditions, concurrency, partial failure states?
                - HTTP 4xx/5xx handling? Timeout? Malformed JSON?
                - Retry/resume safe? Would re-running create duplicates?

            3. **Architecture & Design**
                - Aligned with existing patterns? SRP?
                - Is the PR atomic (single cohesive purpose)?
                - Unnecessary complexity?

            4. **Performance & Scalability**
                - N+1 queries? Missing indexes? Inefficient loops?
                - Resource leaks (unclosed files/connections)?

            ### Output Format (MANDATORY)

            Your review body MUST use GitHub-flavored Markdown with this exact structure:

            ```
            ## Review Summary

            <1-2 sentence verdict>

            ### Critical
            - **`file.py:42`** — <description of critical issue>
              **Fix:** <exact fix suggestion>

            ### Medium
            - **`file.py:99`** — <description>
              **Fix:** <suggestion>

            ### Nit
            - **`file.py:12`** — <minor suggestion>

            ### Checked & Clean
            - <area 1>: <what you verified>
            - <area 2>: <what you verified>
            ```

            Rules for the output:
            - ALWAYS use the sections above. Omit a section ONLY if it has zero items.
            - Each finding MUST include the file path and line number.
            - Each finding MUST include a **Fix:** line with actionable guidance.
            - The "Checked & Clean" section lists areas you reviewed and found no issues.
            - Use bullet points, headers, code blocks. NEVER output a wall of text.

            ### Submission Rules

            **CRITICAL: Use `gh pr review` to submit your review.**

            - If you have ANY findings (including Nits): `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "$(cat <<'REVIEW'\n<your formatted review>\nREVIEW\n)"`
            - ONLY if you have ZERO findings: `gh pr review ${{ github.event.pull_request.number }} --approve --body "$(cat <<'REVIEW'\n<your formatted review>\nREVIEW\n)"`

            ANY feedback = CHANGES_REQUESTED. Do NOT approve if you have Nits.
            Submit exactly ONE review, then STOP.

          claude_args: '--model claude-sonnet-4-6 --allowed-tools "Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr comment:*),Bash(gh pr checks:*)"'

      - name: Deduplicate Claude reviews
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const claudeReviews = reviews
              .filter(r =>
                (r.user.login === 'claude[bot]' || r.user.login === 'claude')
                && (r.state === 'APPROVED' || r.state === 'CHANGES_REQUESTED')
              )
              .sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));

            if (claudeReviews.length > 1) {
              console.log(`Found ${claudeReviews.length} Claude reviews, keeping latest, dismissing ${claudeReviews.length - 1} duplicates`);
              for (const review of claudeReviews.slice(1)) {
                try {
                  await github.rest.pulls.dismissReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.payload.pull_request.number,
                    review_id: review.id,
                    message: 'Duplicate review dismissed'
                  });
                  console.log(`Dismissed duplicate review ${review.id}`);
                } catch (e) {
                  console.log(`Could not dismiss review ${review.id}: ${e.message}`);
                }
              }
            }

      - name: Nudge Foundry via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="foundry-nudge: ${{ github.repository }} PR#${{ github.event.pull_request.number }} reviewer=claude status=${{ job.status }}" \
            >/dev/null 2>&1 || true

