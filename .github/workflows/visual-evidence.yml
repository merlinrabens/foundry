name: Visual Evidence
on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  deployments: read
  statuses: read

jobs:
  record:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ready-for-evidence'
    outputs:
      captured: ${{ steps.record.outputs.captured }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed routes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          CUSTOM_ROUTES: ${{ vars.VISUAL_EVIDENCE_ROUTES }}
        run: |
          CHANGED=$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" || echo "")

          # Check for frontend changes (broad heuristic for any framework)
          if ! echo "$CHANGED" | grep -qiE '\.(tsx|jsx|vue|svelte|css|scss|html)$|frontend/|src/components/|/pages/|/app/'; then
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_frontend=true" >> "$GITHUB_OUTPUT"

          # Use custom routes if set as repo variable, otherwise detect from files
          if [ -n "$CUSTOM_ROUTES" ]; then
            echo "routes=$CUSTOM_ROUTES" >> "$GITHUB_OUTPUT"
            echo "Using custom routes: $CUSTOM_ROUTES"
            exit 0
          fi

          # Generic route detection: map changed files to URL paths
          # Works for Next.js App Router, Pages Router, and similar file-based routers
          declare -A ROUTE_MAP

          while IFS= read -r file; do
            [[ "$file" =~ \.(md|txt|test\.|spec\.)$ ]] && continue

            # Shared files -> homepage
            if echo "$file" | grep -qE '(components/|/layout\.|globals\.css|/lib/|/hooks/|/utils/)'; then
              ROUTE_MAP["/"]="public"
              continue
            fi

            # Next.js App Router: app/**/page.tsx
            if echo "$file" | grep -qE '/app/.*page\.(tsx|jsx|ts|js)$'; then
              rel=$(echo "$file" | sed 's|.*/app/||')
              # Strip route groups
              clean=$(echo "$rel" | sed 's|([^)]*)\/||g')
              dir=$(dirname "$clean")
              [[ "$dir" == "." ]] && dir=""
              route="/${dir}"
              route=$(echo "$route" | sed 's|/$||')
              [[ -z "$route" ]] && route="/"
              [[ "$route" == /api* ]] && continue
              ROUTE_MAP["$route"]="public"
              continue
            fi

            # Next.js Pages Router: pages/*.tsx
            if echo "$file" | grep -qE '/pages/.*\.(tsx|jsx|ts|js)$'; then
              rel=$(echo "$file" | sed 's|.*/pages/||; s|\.(tsx|jsx|ts|js)$||')
              [[ "$rel" == "_app" || "$rel" == "_document" || "$rel" == "index" ]] && { ROUTE_MAP["/"]="public"; continue; }
              [[ "$rel" == api/* ]] && continue
              route="/${rel}"
              ROUTE_MAP["$route"]="public"
              continue
            fi

            # Fallback: any changed visual file -> homepage
            if echo "$file" | grep -qiE '\.(tsx|jsx|vue|svelte|css|scss|html)$'; then
              ROUTE_MAP["/"]="public"
            fi
          done <<< "$CHANGED"

          if [ ${#ROUTE_MAP[@]} -eq 0 ]; then
            ROUTE_MAP["/"]="public"
          fi

          # Build JSON, cap at 8
          ROUTES="["
          count=0
          for route in $(echo "${!ROUTE_MAP[@]}" | tr ' ' '\n' | sort); do
            [ $count -ge 8 ] && break
            [ $count -gt 0 ] && ROUTES+=","
            ROUTES+="{\"path\":\"$route\",\"auth\":\"${ROUTE_MAP[$route]}\"}"
            count=$((count + 1))
          done
          ROUTES+="]"

          echo "routes=$ROUTES" >> "$GITHUB_OUTPUT"
          echo "Detected routes: $ROUTES"

      - name: Setup Node.js
        if: steps.detect.outputs.has_frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.detect.outputs.has_frontend == 'true'
        run: npm ci || npm install || true

      - name: Install Playwright + FFmpeg
        if: steps.detect.outputs.has_frontend == 'true'
        run: |
          npx playwright install --with-deps chromium webkit
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Wait for Vercel preview
        if: steps.detect.outputs.has_frontend == 'true'
        id: vercel
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          for i in $(seq 1 30); do
            DEPLOY_ID=$(gh api "repos/${REPO}/deployments?sha=${SHA}&environment=Preview&per_page=1" --jq '.[0].id // empty' 2>/dev/null || true)
            if [ -n "$DEPLOY_ID" ]; then
              URL=$(gh api "repos/${REPO}/deployments/${DEPLOY_ID}/statuses" --jq '[.[] | select(.state == "success")] | .[0].environment_url // empty' 2>/dev/null || true)
              if [ -n "$URL" ]; then
                echo "url=$URL" >> "$GITHUB_OUTPUT"
                echo "Preview URL: $URL"
                exit 0
              fi
            fi
            echo "Waiting for Vercel preview... (${i}/30)"
            sleep 10
          done
          echo "::warning::Vercel preview not ready after 5 minutes"

      - name: Record per-route screencasts
        if: steps.detect.outputs.has_frontend == 'true'
        id: record
        env:
          PREVIEW_URL: ${{ steps.vercel.outputs.url }}
          DETECTED_ROUTES: ${{ steps.detect.outputs.routes }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_LOGIN_URL: /login
        run: |
          set +e

          ACTUAL_URL=""
          if [ -n "$PREVIEW_URL" ] && echo "$PREVIEW_URL" | grep -qE '^https://'; then
            ACTUAL_URL="$PREVIEW_URL"
          fi

          STARTED_DEV=false
          if [ -z "$ACTUAL_URL" ]; then
            npm run dev &
            STARTED_DEV=true
            for i in $(seq 1 60); do
              if curl -sf http://localhost:5173 > /dev/null 2>&1; then
                ACTUAL_URL="http://localhost:5173"; break
              elif curl -sf http://localhost:3000 > /dev/null 2>&1; then
                ACTUAL_URL="http://localhost:3000"; break
              fi
              [ "$i" -eq 60 ] && { echo "::error::Dev server failed to start"; exit 1; }
              sleep 1
            done
          fi

          mkdir -p videos

          cat > /tmp/record-screencast.mjs << 'SCRIPT'
          import { chromium, webkit, devices } from 'playwright';
          import { renameSync, statSync } from 'fs';

          const url = process.env.ACTUAL_URL || 'http://localhost:3000';
          const routes = JSON.parse(process.env.DETECTED_ROUTES || '[{"path":"/","auth":"public"}]');
          const testEmail = process.env.TEST_USER_EMAIL || '';
          const testPassword = process.env.TEST_USER_PASSWORD || '';
          const loginUrl = process.env.TEST_LOGIN_URL || '/login';
          let exitCode = 0;

          function routeSlug(path) {
            if (path === '/') return 'home';
            return path.replace(/^\//, '').replace(/\//g, '-');
          }

          async function scrollPage(page) {
            await page.evaluate(async () => {
              const delay = ms => new Promise(r => setTimeout(r, ms));
              const height = document.body.scrollHeight;
              const step = Math.max(200, Math.floor(height / 8));
              for (let y = 0; y < height; y += step) {
                window.scrollTo({ top: y, behavior: 'smooth' });
                await delay(400);
              }
              await delay(500);
              window.scrollTo({ top: 0, behavior: 'smooth' });
              await delay(300);
            });
          }

          async function loginAndSaveState(browser, contextOptions) {
            if (!testEmail || !testPassword) return null;
            console.log(`  Logging in as ${testEmail}...`);
            const context = await browser.newContext(contextOptions);
            const page = await context.newPage();
            try {
              await page.goto(url + loginUrl, { waitUntil: 'networkidle', timeout: 15000 });
              await page.fill('input[type="email"], #email', testEmail);
              await page.fill('input[type="password"], #password', testPassword);
              await page.click('button[type="submit"]');
              await page.waitForURL(u => !u.toString().includes(loginUrl), { timeout: 10000 });
              const statePath = '/tmp/auth-state.json';
              await context.storageState({ path: statePath });
              await page.close();
              await context.close();
              return statePath;
            } catch (e) {
              console.error(`  Login failed: ${e.message.split('\n')[0]}`);
              await page.close();
              await context.close();
              return null;
            }
          }

          async function recordRoute(browserType, baseOptions, route, deviceLabel, authStatePath) {
            const slug = routeSlug(route.path);
            const filename = `${deviceLabel}-${slug}`;

            const browser = await browserType.launch();

            let storageState = undefined;
            if (route.auth !== 'public' && !authStatePath) {
              authStatePath = await loginAndSaveState(browser, baseOptions);
            }
            if (route.auth !== 'public') storageState = authStatePath;

            const context = await browser.newContext({
              ...baseOptions,
              ...(storageState ? { storageState } : {}),
              recordVideo: { dir: './videos/', size: baseOptions.viewport },
            });
            const page = await context.newPage();

            try {
              const resp = await page.goto(url + route.path, { waitUntil: 'networkidle', timeout: 15000 });
              if (resp && resp.status() >= 400) {
                console.error(`  [${filename}] HTTP ${resp.status()}`);
                exitCode = 1;
              } else {
                await page.waitForTimeout(1500);
                await scrollPage(page);
                await page.waitForTimeout(500);
              }
            } catch (e) {
              console.error(`  [${filename}] ${e.message.split('\n')[0]}`);
              exitCode = 1;
            }

            const videoPath = await page.video().path();
            await page.close();
            await context.close();
            await browser.close();

            const dest = `./videos/${filename}.webm`;
            try {
              renameSync(videoPath, dest);
              const stats = statSync(dest);
              if (stats.size < 5120) return null;
              console.log(`  [${filename}] ${(stats.size / 1024).toFixed(0)} KB`);
              return filename;
            } catch {
              return null;
            }
          }

          const DEVICES = [
            { label: 'desktop', type: chromium, options: { viewport: { width: 1440, height: 900 } } },
            { label: 'mobile',  type: webkit,   options: { ...devices['iPhone 14'] } },
          ];

          console.log(`Recording ${routes.length} route(s) x ${DEVICES.length} device(s) on ${url}`);

          const recorded = [];
          for (const route of routes) {
            for (const device of DEVICES) {
              const result = await recordRoute(device.type, device.options, route, device.label, null);
              if (result) recorded.push(result);
            }
          }

          console.log(`\nRecorded ${recorded.length}/${routes.length * DEVICES.length} videos`);
          process.exit(exitCode);
          SCRIPT

          ACTUAL_URL="$ACTUAL_URL" node /tmp/record-screencast.mjs
          RECORD_EXIT=$?

          if [ "$STARTED_DEV" = true ]; then
            pkill -f "node" 2>/dev/null || true
            sleep 1
          fi

          if ls videos/*.webm 1>/dev/null 2>&1; then
            echo "captured=true" >> "$GITHUB_OUTPUT"
            ls -lh videos/
          else
            echo "captured=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          exit $RECORD_EXIT

      - name: Transcode to GIF per route
        if: steps.record.outputs.captured == 'true'
        id: transcode
        run: |
          for webm in videos/*.webm; do
            base=$(basename "$webm" .webm)
            ffmpeg -i "$webm" \
              -vf "fps=10,scale=640:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=128[p];[s1][p]paletteuse=dither=bayer" \
              -loop 0 \
              "videos/${base}.gif" 2>/dev/null
            echo "Transcoded: ${base}.gif"
          done
          rm -f videos/*.webm
          ls -lh videos/
          echo "transcoded=true" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        if: steps.transcode.outputs.transcoded == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-evidence
          path: videos/
          retention-days: 14

      - name: Skip (no frontend changes)
        if: steps.detect.outputs.has_frontend != 'true'
        run: echo "No frontend changes detected, skipping visual evidence"

  upload:
    needs: record
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: needs.record.outputs.captured == 'true' && github.event.label.name == 'ready-for-evidence'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: visual-evidence
          path: videos/
        continue-on-error: true

      - name: Check artifacts exist
        id: check
        run: |
          if ls videos/*.gif 1>/dev/null 2>&1; then
            echo "exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "exist=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to R2 CDN
        if: steps.check.outputs.exist == 'true'
        id: cdn
        continue-on-error: true
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CDN_BASE: ${{ secrets.CDN_BASE_URL }}
          EVIDENCE_PATH: visual-evidence/${{ github.repository }}/${{ github.event.pull_request.number }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "Missing R2 credentials, skipping CDN upload"
            exit 0
          fi

          pip install awscli --quiet

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          MANIFEST=""
          for gif in videos/desktop-*.gif; do
            [ -f "$gif" ] || continue
            base=$(basename "$gif" .gif)
            slug="${base#desktop-}"

            aws s3 cp "$gif" "s3://${R2_BUCKET}/${EVIDENCE_PATH}/${base}.gif" \
              --endpoint-url "$ENDPOINT" --content-type "image/gif" --quiet
            DESKTOP_URL="${CDN_BASE}/${EVIDENCE_PATH}/${base}.gif"

            MOBILE_URL=""
            if [ -f "videos/mobile-${slug}.gif" ]; then
              aws s3 cp "videos/mobile-${slug}.gif" "s3://${R2_BUCKET}/${EVIDENCE_PATH}/mobile-${slug}.gif" \
                --endpoint-url "$ENDPOINT" --content-type "image/gif" --quiet
              MOBILE_URL="${CDN_BASE}/${EVIDENCE_PATH}/mobile-${slug}.gif"
            fi

            [ -n "$MANIFEST" ] && MANIFEST+=","
            MANIFEST+="${slug}|${DESKTOP_URL}|${MOBILE_URL}"
          done

          echo "uploaded=true" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"

      - name: Post PR comment (CDN — per-route table)
        if: steps.cdn.outputs.uploaded == 'true'
        env:
          MANIFEST: ${{ steps.cdn.outputs.manifest }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY="## Visual Evidence"$'\n\n'
          BODY+="| Route | Desktop (1440x900) | Mobile (iPhone 14) |"$'\n'
          BODY+="|-------|--------------------|--------------------|"$'\n'

          IFS=',' read -ra ENTRIES <<< "$MANIFEST"
          for entry in "${ENTRIES[@]}"; do
            IFS='|' read -r slug desktop_url mobile_url <<< "$entry"
            route="/${slug}"
            [ "$slug" = "home" ] && route="/"
            route=$(echo "$route" | sed 's|-|/|g')

            desktop_col="![desktop](${desktop_url})"
            if [ -n "$mobile_url" ]; then
              mobile_col="![mobile](${mobile_url})"
            else
              mobile_col="_not captured_"
            fi
            BODY+="| \`${route}\` | ${desktop_col} | ${mobile_col} |"$'\n'
          done

          BODY+=$'\n---\n'
          BODY+="_Only routes changed in this PR — [all artifacts](${RUN_URL})_"

          # Delete ALL old visual evidence comments so the new one appears at the bottom
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.body | contains("## Visual Evidence")) | .id' 2>/dev/null \
            | while read -r old_id; do
                gh api "repos/${REPO}/issues/comments/${old_id}" -X DELETE 2>/dev/null || true
              done

          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"

      - name: Post PR comment (artifacts — no CDN)
        if: steps.cdn.outputs.uploaded != 'true' && steps.check.outputs.exist == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.body | contains("## Visual Evidence")) | .id' 2>/dev/null \
            | while read -r old_id; do
                gh api "repos/${REPO}/issues/comments/${old_id}" -X DELETE 2>/dev/null || true
              done

          BODY="## Visual Evidence"$'\n\n'
          BODY+="Per-route GIFs captured for changed pages. Download from [workflow artifacts](${RUN_URL})."$'\n\n'
          BODY+="> To enable inline GIFs, add R2 CDN secrets: \`R2_ACCOUNT_ID\`, \`R2_ACCESS_KEY_ID\`, \`R2_SECRET_ACCESS_KEY\`"$'\n\n'
          BODY+="_Only routes changed in this PR_"

          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"

      - name: Skip (no frontend changes)
        if: steps.check.outputs.exist != 'true'
        run: echo "No visual evidence artifacts found"
